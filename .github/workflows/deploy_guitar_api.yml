# Guitar Teacher Pro - Auto Deploy Workflow
#
# This workflow automatically deploys both the API backend and web frontend
# when changes are pushed to the guitar project.
#
# Required Repository Secrets (Settings → Secrets and variables → Actions):
# - VERCEL_TOKEN: Your Vercel API token (https://vercel.com/account/tokens)
# - VERCEL_ORG_ID: Your Vercel org ID (run `vercel link` locally to get)
# - VERCEL_PROJECT_ID: Your project ID (run `vercel link` locally to get)
# - MISTRAL_API_KEY: Your Mistral AI API key (https://console.mistral.ai)
#
# The workflow will:
# 1. Deploy the API to Vercel with your Mistral AI key
# 2. Update the frontend config with the deployed API URL
# 3. Deploy the frontend to GitHub Pages
#
# Your guitar teacher will be available at:
# https://yourusername.github.io/your-repo-name

name: Deploy Guitar Teacher API

on:
  push:
    branches: [main]
    paths:
      - "mistral/guitar/api/**"
      - "mistral/guitar/vercel.json"
      - ".github/workflows/deploy_guitar_api.yml"
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mistral/guitar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "Deploying guitar teacher API to Vercel..."
          vercel deploy --prod --token $VERCEL_TOKEN --confirm

      - name: Get deployment URL
        id: vercel-url
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          URL=$(vercel ls --token $VERCEL_TOKEN | grep guitar-teacher-api | head -1 | awk '{print $2}')
          echo "deployment_url=https://$URL" >> $GITHUB_OUTPUT
          echo "🎸 Guitar Teacher API deployed to: https://$URL"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-api
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update API URL in config
        env:
          API_URL: ${{ needs.deploy-api.outputs.deployment_url }}
        run: |
          cd mistral/guitar/public
          # Update the config.js with the deployed API URL
          if [ ! -z "$API_URL" ]; then
            sed -i "s|API_BASE_URL: 'https://your-api-domain.com/api'|API_BASE_URL: '$API_URL/api'|g" config.js
            echo "Updated API_BASE_URL to: $API_URL/api"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./mistral/guitar/public
          publish_branch: gh-pages

      - name: Summary
        run: |
          echo "🎸 Guitar Teacher deployment complete!"
          echo "Frontend: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          echo "API: ${{ needs.deploy-api.outputs.deployment_url }}"
